name: Cerca Agenzie Marketing

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  cerca:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa librerie
        run: pip install requests openpyxl

      - name: Cerca agenzie
        run: python cerca_agenzie.py

      - name: Scarica file Excel
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agenzie-da-contattare
          path: "agenzie_*.xlsx"
          retention-days: 30
