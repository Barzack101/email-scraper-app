name: Trova Aziende Toyota

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 2'

jobs:
  cerca:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa librerie
        run: pip install requests openpyxl

      - name: Cerca aziende
        run: python trova_aziende_toyota.py

      - name: Salva file Excel
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aziende-toyota-pescara-teramo
          path: "aziende_toyota_*.xlsx"
          retention-days: 30
