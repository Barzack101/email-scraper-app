name: Run Email Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa librerie
        run: |
          pip install openpyxl pdfplumber requests

      - name: Avvia lo script
        run: python scraper.py

      - name: Scarica file Excel
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: email-sanitari-abruzzo
          path: "*.xlsx"
          retention-days: 30
